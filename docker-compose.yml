services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: wa
      POSTGRES_USER: wa
      POSTGRES_PASSWORD: wa
    ports: ["5432:5432"]
    volumes:
      - "db_data:/var/lib/postgresql/data"
      - "./docker/postgres-init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  worker:
    build: .
    command: celery -A wa_main worker -l info
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes: [".:/app"]
    depends_on: [web]

  beat:
    build: .
    command: celery -A wa_main beat -l info
    env_file: .env
    environment:
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes: [".:/app"]
    depends_on: [web]

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile"]
    depends_on: [web]

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  ai_service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    env_file: .env
    environment:
      AI_DATABASE_URL: postgresql://wa:wa@db:5432/wa
      AI_OLLAMA_BASE_URL: http://ollama:11434
    ports: ["8001:8001"]
    volumes: [".:/app"]
    depends_on:
      db: { condition: service_healthy }
      ollama: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports: ["8002:8002"]
    depends_on: [caddy]

volumes:
  db_data:
  minio_data:
  ollama_data:
