# Minimal Prometheus scrape config for the Workflow Automation stack.
# Replace the hostnames with the real service names when deploying.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "django-web"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]

  - job_name: "ai-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai_service:8001"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
